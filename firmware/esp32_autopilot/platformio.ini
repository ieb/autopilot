; ESP32-S3 Consolidated Autopilot
; ================================
;
; Single-board autopilot combining:
; - BNO055 IMU (I2C, onboard fusion)
; - NMEA2000 CAN bus (TWAI)
; - PD/PID/Smooth/Adaptive pilots
; - Rudder actuator control (BTS7960 H-bridge)
; - Web configuration UI (AsyncWebServer)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = default_16MB.csv
board_build.filesystem = spiffs

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
lib_ldf_mode = deep+

lib_deps =
    adafruit/Adafruit BNO055@^1.6.3
    adafruit/Adafruit Unified Sensor@^1.1.14
    https://github.com/ttlappalainen/NMEA2000.git
    https://github.com/ieb/NMEA2000_twai.git#platformIOUse
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    bblanchon/ArduinoJson@^7.3.0

; Native test environment (pilots only, runs on host machine)
[env:native]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_BUILD
test_build_src = yes
build_src_filter =
    +<pilots/>
    +<polar.cpp>
lib_deps =
lib_ignore =
    Adafruit BNO055
    Adafruit Unified Sensor
    NMEA2000
    NMEA2000_twai
    ESP Async WebServer
    ArduinoJson

; Native simulation — full firmware with fake hardware and HTTP server
[env:sim]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_BUILD
    -DSIM_BUILD
    -pthread
    -Ilib/httplib
    -Iinclude
    -Isrc
build_src_filter =
    +<pilots/>
    +<polar.cpp>
    +<pilot_manager.cpp>
    +<sim/>
lib_deps =
lib_ignore =
    Adafruit BNO055
    Adafruit Unified Sensor
    NMEA2000
    NMEA2000_twai
    ESP Async WebServer
    ArduinoJson

; HAL-level simulation — real firmware code with hardware-level fakes.
; n2k.cpp, imu.cpp, actuator.cpp compile and run unchanged.
; Only web.cpp is replaced (ESPAsyncWebServer not portable).
[env:hal_sim]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_BUILD
    -DSIM_BUILD
    -DHAL_SIM
    -pthread
    -Isrc/hal
    -Ilib/httplib
    -Ilib/NMEA2000/src
    -Ilib/Adafruit_BNO055
    -Ilib/Adafruit_BusIO
    -Ilib/Adafruit_Sensor
    -Iinclude
    -Isrc
build_src_filter =
    +<pilots/>
    +<polar.cpp>
    +<pilot_manager.cpp>
    +<n2k.cpp>
    +<imu.cpp>
    +<actuator.cpp>
    +<seatalk.cpp>
    +<hal/>
    +<sim/sim_web.cpp>
lib_deps =
    NMEA2000
    Adafruit_BNO055_local
    Adafruit_BusIO_local
    Adafruit_Sensor_local
lib_ldf_mode = off
lib_extra_dirs = lib
